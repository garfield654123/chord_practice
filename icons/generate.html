<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>右鍵點擊圖片 → 儲存為 PNG 到 icons/ 資料夾</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.16;

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Piano keys
  const keyW = s * 0.115;
  const keyH = s * 0.42;
  const startX = s * 0.15;
  const startY = s * 0.38;
  const gap = s * 0.005;

  // White keys
  ctx.fillStyle = '#fefefe';
  for (let i = 0; i < 6; i++) {
    const x = startX + i * (keyW + gap);
    ctx.beginPath();
    ctx.roundRect(x, startY, keyW, keyH, s * 0.015);
    ctx.fill();
  }

  // Black keys
  ctx.fillStyle = '#1a1a1a';
  const blackW = keyW * 0.7;
  const blackH = keyH * 0.6;
  const blackPositions = [0, 1, 3, 4]; // C#, D#, F#, G#
  blackPositions.forEach(i => {
    const x = startX + (i + 1) * (keyW + gap) - blackW / 2;
    ctx.beginPath();
    ctx.roundRect(x, startY, blackW, blackH, s * 0.01);
    ctx.fill();
  });

  // Selected dots
  ctx.fillStyle = '#3498db';
  const dotR = s * 0.028;
  [0, 2, 4].forEach(i => {
    const x = startX + i * (keyW + gap) + keyW / 2;
    const y = startY + keyH * 0.65;
    ctx.beginPath();
    ctx.arc(x, y, dotR, 0, Math.PI * 2);
    ctx.fill();
  });

  // Title
  ctx.fillStyle = '#e94560';
  ctx.font = `bold ${s * 0.14}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('♪ C', s / 2, startY - s * 0.06);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto download
['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon-${canvas.width}.png`;
  link.href = canvas.toDataURL('image/png');
  const img = new Image();
  img.src = link.href;
  canvas.parentNode.insertBefore(img, canvas.nextSibling);
});
</script>
</body>
</html>
